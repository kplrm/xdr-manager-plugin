name: Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLUGIN_NAME: xdr-coordinator
  PLUGIN_ID: xdrCoordinator
  OPENSEARCH_DASHBOARDS_REPOSITORY: opensearch-project/OpenSearch-Dashboards
  OPENSEARCH_DASHBOARDS_VERSION: 3.5.0
  OPENSEARCH_DASHBOARDS_REF: 3.5.0

jobs:
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync package metadata from VERSION
        run: node ./scripts/sync_version.js

      - name: Validate plugin version metadata
        id: version
        run: |
          FILE_VERSION=$(tr -d '\n' < VERSION)
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./opensearch_dashboards.json').version")

          if [ "${FILE_VERSION}" != "${PACKAGE_VERSION}" ] || [ "${FILE_VERSION}" != "${MANIFEST_VERSION}" ]; then
            echo "VERSION (${FILE_VERSION}), package.json (${PACKAGE_VERSION}), and opensearch_dashboards.json (${MANIFEST_VERSION}) must match" >&2
            exit 1
          fi

          echo "version=${FILE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release tag already exists
        id: tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v${{ steps.version.outputs.version }} already exists; skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build plugin ZIP
    needs: version
    if: needs.version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout OpenSearch Dashboards
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPENSEARCH_DASHBOARDS_REPOSITORY }}
          ref: ${{ env.OPENSEARCH_DASHBOARDS_REF }}
          path: opensearch-dashboards

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: opensearch-dashboards/.nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install Yarn
        run: npm install -g yarn@1.22.22

      - name: Sync package metadata from VERSION
        run: node ./scripts/sync_version.js

      - name: Stage plugin source in OpenSearch Dashboards checkout
        run: |
          mkdir -p opensearch-dashboards/plugins/${{ env.PLUGIN_NAME }}
          rsync -a --delete \
            --exclude='.git' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='opensearch-dashboards' \
            ./ opensearch-dashboards/plugins/${{ env.PLUGIN_NAME }}/

      - name: Cache yarn packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-osd-${{ hashFiles('opensearch-dashboards/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-osd-

      - name: Bootstrap OpenSearch Dashboards
        working-directory: opensearch-dashboards
        run: yarn osd bootstrap --single-version=loose || yarn osd bootstrap --single-version=loose

      - name: Build plugin ZIP
        working-directory: opensearch-dashboards/plugins/${{ env.PLUGIN_NAME }}
        run: node ../../scripts/plugin_helpers build --opensearch-dashboards-version=${{ env.OPENSEARCH_DASHBOARDS_VERSION }} 2>&1 | tee build.log

      - name: Locate built ZIP
        id: zip
        working-directory: opensearch-dashboards/plugins/${{ env.PLUGIN_NAME }}
        run: |
          ZIP_PATH=$(find build -maxdepth 1 -name '*.zip' | head -1)
          if [ -z "${ZIP_PATH}" ]; then
            echo "Built ZIP not found under build/" >&2
            ls -la build/ >&2 || true
            exit 1
          fi
          echo "path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"
          echo "Resolved ZIP: ${ZIP_PATH}"

      - name: Upload plugin ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: opensearch-dashboards/plugins/${{ env.PLUGIN_NAME }}/${{ steps.zip.outputs.path }}
          retention-days: 1

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build-log
          path: opensearch-dashboards/plugins/${{ env.PLUGIN_NAME }}/build.log
          retention-days: 7

  smoke-test:
    name: "[${{ matrix.os }}/${{ matrix.arch }}] install smoke test"
    needs: [version, build]
    if: needs.version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian / amd64
          - os: debian
            arch: amd64
            test_image: debian:stable-slim
            platform: linux/amd64
            osd_suffix: linux-x64

          # Debian / arm64
          - os: debian
            arch: arm64
            test_image: debian:stable-slim
            platform: linux/arm64
            osd_suffix: linux-arm64

          # CentOS-compatible / amd64
          - os: centos
            arch: amd64
            test_image: almalinux:9
            platform: linux/amd64
            osd_suffix: linux-x64

          # CentOS-compatible / arm64
          - os: centos
            arch: arm64
            test_image: almalinux:9
            platform: linux/arm64
            osd_suffix: linux-arm64

    steps:
      - name: Set up QEMU (arm64 only)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Download plugin ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip
          path: dist

      - name: Smoke test plugin install
        env:
          OSD_ARTIFACT_URL: https://artifacts.opensearch.org/releases/bundle/opensearch-dashboards/${{ env.OPENSEARCH_DASHBOARDS_VERSION }}/opensearch-dashboards-${{ env.OPENSEARCH_DASHBOARDS_VERSION }}-${{ matrix.osd_suffix }}.tar.gz
        run: |
          ZIP_PATH=$(find dist -maxdepth 1 -name '*.zip' | head -1)
          if [ -z "${ZIP_PATH}" ]; then
            echo "Downloaded ZIP not found in dist/" >&2
            ls -la dist/ >&2 || true
            exit 1
          fi

          cp "${ZIP_PATH}" dist/xdr-coordinator.zip

          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "${PWD}/dist:/pkg:ro" \
            ${{ matrix.test_image }} \
            sh -lc "
              set -eu
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update -qq
                apt-get install -y bash ca-certificates curl gzip tar >/dev/null
              else
                # curl-minimal is pre-installed in almalinux:9 and conflicts with curl;
                # use --allowerasing to replace it, or rely on the already-present curl binary.
                dnf install -y --allowerasing bash ca-certificates curl gzip tar which findutils >/dev/null
              fi

              mkdir -p /opt/osd
              curl -fsSL '${OSD_ARTIFACT_URL}' | tar -xz -C /opt/osd

              OSD_HOME=\$(find /opt/osd -maxdepth 1 -type d -name 'opensearch-dashboards-*' | head -1)
              if [ -z \"\${OSD_HOME}\" ]; then
                echo 'OpenSearch Dashboards extraction failed' >&2
                exit 1
              fi

              \${OSD_HOME}/bin/opensearch-dashboards-plugin install --allow-root file:///pkg/xdr-coordinator.zip
              echo '==> Contents of plugins/ after install:'
              ls \${OSD_HOME}/plugins/
              if [ ! -d \${OSD_HOME}/plugins/${{ env.PLUGIN_ID }} ]; then
                echo 'ERROR: plugin directory ${{ env.PLUGIN_ID }} not found after install' >&2
                exit 1
              fi
              echo '==> Smoke test PASSED: ${{ env.PLUGIN_ID }} is installed'
            "

  release:
    name: Publish GitHub Release
    needs: [version, build, smoke-test]
    if: needs.version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download plugin ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip
          path: release-artifacts/raw

      - name: Prepare release assets
        run: |
          VERSION=${{ needs.version.outputs.version }}
          RAW_ZIP=$(find release-artifacts/raw -maxdepth 1 -name '*.zip' | head -1)
          TARGET_ZIP="release-artifacts/xdr-coordinator_${VERSION}_osd-${{ env.OPENSEARCH_DASHBOARDS_VERSION }}.zip"
          CHECKSUM_FILE="release-artifacts/xdr-coordinator_${VERSION}_osd-${{ env.OPENSEARCH_DASHBOARDS_VERSION }}.sha256"

          if [ -z "${RAW_ZIP}" ]; then
            echo "Release ZIP artifact not found" >&2
            exit 1
          fi

          cp "${RAW_ZIP}" "${TARGET_ZIP}"
          (
            cd release-artifacts
            sha256sum "$(basename "${TARGET_ZIP}")" > "$(basename "${CHECKSUM_FILE}")"
          )

      - name: Create and push release tag
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: xdr-coordinator v${{ needs.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.zip
            release-artifacts/*.sha256

  docker-publish:
    name: Publish Docker image
    needs: [version, smoke-test, release]
    if: needs.version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download plugin ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip
          path: docker-context

      - name: Stage ZIP and Dockerfile into build context
        run: |
          ZIP=$(find docker-context -maxdepth 1 -name '*.zip' | head -1)
          mv "${ZIP}" docker-context/xdr-coordinator.zip
          cp Dockerfile docker-context/Dockerfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            OSD_VERSION=${{ env.OPENSEARCH_DASHBOARDS_VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/opensearch-dashboards-xdr:v${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/opensearch-dashboards-xdr:latest